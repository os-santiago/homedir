# HomeDir first-level incident shield.
# When /etc/homedir.incident.lock exists, external traffic is served with maintenance page (503),
# while local health checks remain available to automation.

set $homedir_incident_block 0;

if (-f /etc/homedir.incident.lock) {
    set $homedir_incident_block 1;
}

if ($remote_addr = 127.0.0.1) {
    set $homedir_incident_block 0;
}

if ($request_uri ~ "^/q/health") {
    set $homedir_incident_block 0;
}

if ($homedir_incident_block = 1) {
    return 503;
}

