# ============================================================================
# AUTONOMOUS DECISION POLICY CONFIGURATION
# ============================================================================
#
# This file defines pre-established preferences for autonomous decisions
# made by the AI SDLC worker. When the worker encounters a decision point,
# it consults these policies BEFORE escalating to needs-human.
#
# Version: 1.0
# Owner: scanales-stack
# Last Updated: 2026-07-16
#
# ============================================================================

version: "1.0"
owner: "scanales-stack"
last_updated: "2026-07-16"

# ============================================================================
# 1. PERFORMANCE OPTIMIZATION POLICIES
# ============================================================================
performance:
  # API response time targets
  api_response_time:
    target_ms: 200
    acceptable_ms: 500
    critical_ms: 1000
    action: "Optimize if exceeds acceptable"
    priority_order:
      - "database_queries"     # Check and optimize queries first
      - "caching"              # Add caching layer if needed
      - "code_refactoring"     # Refactor inefficient code
      - "async_processing"     # Move to background jobs
    notes: |
      When issue mentions "slow API" or "performance":
      1. Measure current baseline
      2. Apply optimizations in priority_order
      3. Stop when target_ms achieved
      4. Log decision with before/after metrics

  # Frontend bundle size limits
  frontend_bundle_size:
    target_kb: 200
    max_kb: 500
    action: "Consolidate/minify if exceeds max"
    strategies:
      - "consolidate_files"    # Merge multiple files (like CSS)
      - "remove_duplicates"    # Eliminate duplicate code
      - "tree_shaking"         # Remove unused exports
      - "minification"         # Minify JS/CSS
    notes: |
      Example: Issue #1016 "Large CSS files"
      - homedir.css (49KB) + retro-theme.css (54KB) = 103KB
      - Action: Consolidate → 70KB (within target)
      - Confidence: HIGH (follows existing pattern)

  # Database query performance
  database_query_time:
    target_ms: 50
    max_ms: 200
    action: "Add index if exceeds max"
    optimization_order:
      - "add_index"           # Add database index (safest)
      - "optimize_query"      # Rewrite query (no schema change)
      - "add_caching"         # Cache query results
      - "denormalization"     # Only if critical (requires approval)
    notes: |
      Example: "Login is slow" → SELECT * FROM sessions (no index)
      - Action: Add index on sessions.user_id
      - Confidence: HIGH (non-breaking change)

  # Memory usage limits
  memory_usage:
    target_mb: 512
    max_mb: 1024
    action: "Optimize if exceeds max"
    strategies:
      - "fix_memory_leaks"
      - "optimize_data_structures"
      - "add_pagination"
      - "implement_streaming"

  # Default optimization priority when type unclear
  default_optimization_priority:
    - "database_queries"
    - "caching"
    - "code_refactoring"
    - "infrastructure"

# ============================================================================
# 2. RATE LIMITING & API SECURITY POLICIES
# ============================================================================
rate_limiting:
  # Default rate limits for different user types
  default_limits:
    anonymous: 10           # requests per minute
    authenticated: 100      # requests per minute
    premium: 1000           # requests per minute
    admin: 10000            # requests per minute

  # Automatic application rules
  auto_apply: true
  grace_period_minutes: 5

  # Enforcement strategy
  enforcement:
    response_code: 429
    include_retry_after_header: true
    log_to_monitoring: true
    notify_on_abuse: true

  # Per-endpoint overrides (if issue specifies endpoint)
  endpoint_overrides:
    "/api/auth/login":
      anonymous: 5          # More restrictive for auth
      authenticated: 20
    "/api/public/*":
      anonymous: 100        # More permissive for public APIs
    "/api/admin/*":
      admin_only: true

  notes: |
    Example: Issue #1567 "Implement rate limiting for API"
    - No specific limits mentioned → Use default_limits
    - Action: Apply 10/100/1000 based on user type
    - Confidence: HIGH (policy-defined)

# ============================================================================
# 3. ARCHITECTURAL DECISION POLICIES
# ============================================================================
architecture:
  # Changes allowed without approval
  allowed_autonomous:
    - "add_database_index"
    - "add_caching_layer"        # Redis, Memcached OK
    - "optimize_queries"
    - "add_api_endpoint"
    - "refactor_internal_code"
    - "add_validation"
    - "improve_error_handling"

  # Changes that require approval (escalate to needs-human)
  require_approval:
    - "change_database_engine"   # PostgreSQL → MongoDB
    - "add_message_queue"        # RabbitMQ, Kafka
    - "change_authentication"    # JWT → OAuth2
    - "migrate_cloud_provider"   # AWS → GCP
    - "change_web_framework"     # React → Vue
    - "add_third_party_service"  # New external dependency

  # Database optimization strategy
  database_optimization_order:
    1: "add_index"              # Try first (autonomous, safe)
    2: "optimize_query"         # Then this (autonomous, safe)
    3: "add_read_replica"       # Then this (autonomous with infra check)
    4: "add_caching"            # Then this (autonomous)
    5: "change_engine"          # Last resort (requires approval)

  # Caching strategy
  caching:
    default_ttl_seconds: 300
    allowed_backends:
      - "redis"
      - "memcached"
      - "in_memory"
    auto_add_for:
      - "frequently_accessed_data"
      - "expensive_queries"
      - "static_content"

  notes: |
    Example: Issue #2001 "Database is slow, optimize queries"
    - Found: SELECT * FROM users (10M rows, no index)
    - Action: Add index on email column (autonomous)
    - If that fails: Add Redis cache (autonomous)
    - If still slow: Suggest read replica (needs approval)

# ============================================================================
# 4. DEPENDENCY MANAGEMENT POLICIES
# ============================================================================
dependencies:
  # Automatic update rules by semver
  auto_update:
    patch: true              # 1.2.3 → 1.2.4 (auto, always safe)
    minor: true              # 1.2.x → 1.3.0 (auto if no breaking changes)
    major: false             # 1.x → 2.0 (requires approval)

  # Testing requirements before merge
  testing:
    run_tests: true
    require_passing: true
    test_coverage_min: 80

  # Java version policy
  java:
    current_version: 17
    minimum_version: 17
    auto_upgrade_to_lts: true     # Auto upgrade to next LTS (21)
    max_version: 21               # Don't go beyond this

  # Framework-specific policies
  frameworks:
    spring_boot:
      stay_on_lts: true
      auto_update_minor: true
      max_major_version: "3.x"    # Don't go to 4.x without approval
      notes: |
        Example: Issue #5000 "Update Spring Boot to 3.2"
        - Current: 2.7.x → Target: 3.2.x
        - Major version (2→3) but within max_major_version (3.x)
        - Action: Create upgrade plan, request approval
        - Execute on "approved" comment

    quarkus:
      auto_update_minor: true
      test_before_merge: true
      prefer_lts: true

    react:
      auto_update_minor: true
      max_major_version: "18.x"

  # Security vulnerability handling
  security_updates:
    auto_apply: true              # Auto-apply security patches
    severity_threshold: "medium"  # Auto-apply medium+ severity
    test_before_merge: true
    notify_on_critical: true

# ============================================================================
# 5. COMPLIANCE & DATA PRIVACY POLICIES
# ============================================================================
compliance:
  # Data collection rules
  data_collection:
    # Can collect without legal review
    allowed_without_review:
      - "session_tokens"
      - "csrf_tokens"
      - "feature_flags"
      - "anonymous_analytics"
      - "error_logs"

    # Requires legal review before implementation
    requires_legal_review:
      - "ip_addresses"
      - "geolocation"
      - "biometric_data"
      - "payment_info"
      - "health_data"
      - "personal_identifiable_info"

    notes: |
      Example: Issue #3001 "Store user IP addresses for analytics"
      - "ip_addresses" in requires_legal_review
      - Action: NEEDS-HUMAN with legal review requirement
      - Message: "IP address storage requires GDPR compliance review"

  # GDPR compliance defaults
  gdpr:
    auto_add_consent_mechanism: true
    data_retention_days: 365
    auto_anonymize_after_retention: true
    include_data_export_endpoint: true
    include_data_deletion_endpoint: true

  # CCPA compliance
  ccpa:
    include_do_not_sell_option: true
    data_retention_days: 365

  # Audit logging
  audit:
    log_data_access: true
    log_data_modifications: true
    retention_years: 7

# ============================================================================
# 6. ERROR HANDLING & DEBUGGING POLICIES
# ============================================================================
error_handling:
  # When error report lacks information
  when_error_lacks_info:
    action: "attempt_auto_investigation"
    investigation_steps:
      - "check_recent_logs"
      - "search_codebase_for_error_code"
      - "check_recent_commits"
      - "attempt_reproduction_common_cases"

    # If investigation fails
    if_cannot_reproduce:
      action: "needs-human"
      request_from_user:
        - "Server logs or stack trace"
        - "Request payload that triggers error"
        - "Steps to reproduce"
        - "Environment (production/staging)"

    notes: |
      Example: Issue #4000 "API returns 500 errors, fix it"
      - No logs, no stack trace, no endpoint
      - Action: Check logs for recent 500s
      - If found: Fix autonomously
      - If not found: Request more info (needs-human)

  # Automatic error handling additions
  auto_add_error_handling:
    uncaught_exceptions: true
    validation_errors: true
    network_errors: true
    database_errors: true

  # Error response format
  error_responses:
    include_error_code: true
    include_message: true
    include_timestamp: true
    include_request_id: true
    hide_stack_trace_production: true

  # Monitoring integration
  monitoring:
    auto_add_logging: true
    auto_add_metrics: true
    alert_on_error_rate_spike: true
    error_rate_threshold: 5  # percent

# ============================================================================
# 7. TESTING POLICIES
# ============================================================================
testing:
  # Coverage requirements
  coverage:
    minimum_percent: 80
    enforce_on_new_code: true
    enforce_on_modified_code: true

  # Test types to auto-add
  auto_add_tests:
    unit_tests: true
    integration_tests: true
    e2e_tests: false          # Too expensive, only on request

  # Testing strategy
  test_strategy:
    prefer_junit5: true
    use_mocks_for_external: true
    use_testcontainers_for_db: true

  # Test naming convention
  naming_convention: "shouldDoSomethingWhenCondition"

  notes: |
    Example: Issue mentions "add feature X"
    - Action: Implement feature + unit tests
    - Coverage: Ensure new code has 80%+ coverage
    - Confidence: HIGH (policy-required)

# ============================================================================
# 8. CODE STYLE & REFACTORING POLICIES
# ============================================================================
refactoring:
  # When to refactor
  triggers:
    method_length_lines: 50       # Refactor if method > 50 lines
    class_length_lines: 300       # Refactor if class > 300 lines
    cyclomatic_complexity: 10     # Refactor if complexity > 10
    duplicate_code_lines: 10      # Extract if duplicate > 10 lines

  # Refactoring strategies
  strategies:
    - "extract_method"
    - "extract_class"
    - "remove_duplication"
    - "simplify_conditionals"
    - "rename_for_clarity"

  # Code style
  style:
    follow_existing_patterns: true
    prefer_composition_over_inheritance: true
    prefer_immutability: true
    use_descriptive_names: true

  notes: |
    Example: Issue "Fix bug in login" → Found method with 80 lines
    - Action: Fix bug + refactor method (extract_method)
    - Confidence: MEDIUM (refactoring is extra work)

# ============================================================================
# 9. NAMING CONVENTIONS
# ============================================================================
naming:
  # Java naming conventions
  java:
    classes: "PascalCase"
    methods: "camelCase"
    constants: "UPPER_SNAKE_CASE"
    packages: "lowercase.dot.separated"

  # JavaScript/TypeScript naming
  javascript:
    variables: "camelCase"
    constants: "UPPER_SNAKE_CASE"
    components: "PascalCase"
    files: "kebab-case"

  # Database naming
  database:
    tables: "snake_case"
    columns: "snake_case"
    indexes: "idx_table_column"
    constraints: "fk_table_column"

  # REST API naming
  api:
    endpoints: "kebab-case"
    query_params: "camelCase"
    json_fields: "camelCase"

  # Auto-rename when found
  auto_rename_violations: true

  notes: |
    Example: Found variable "UserName" in Java
    - Should be: "userName" (camelCase)
    - Action: Rename autonomously
    - Confidence: HIGH (clear convention)

# ============================================================================
# 10. DOCUMENTATION POLICIES
# ============================================================================
documentation:
  # When to add documentation
  auto_add_docs:
    public_api_methods: true
    complex_algorithms: true
    configuration_files: true
    deployment_procedures: true

  # Documentation format
  format:
    java: "javadoc"
    javascript: "jsdoc"
    api: "openapi"
    architecture: "markdown"

  # Content requirements
  content:
    include_parameters: true
    include_return_values: true
    include_exceptions: true
    include_examples: true

  # Update existing docs
  update_on_code_change: true

  notes: |
    Example: Adding new API endpoint
    - Action: Add OpenAPI/Swagger documentation
    - Include: params, responses, examples
    - Confidence: LOW (needs review for accuracy)

# ============================================================================
# 11. SECURITY POLICIES
# ============================================================================
security:
  # Input validation
  input_validation:
    auto_add: true
    validate_all_user_input: true
    sanitize_for_xss: true
    validate_sql_injection: true
    max_input_length: 10000

  # Authentication & Authorization
  authentication:
    require_authentication_by_default: true
    use_bcrypt_for_passwords: true
    min_password_length: 12
    require_2fa_for_admin: true

  # Secrets management
  secrets:
    never_commit_to_git: true
    use_environment_variables: true
    use_secrets_manager: true
    rotate_periodically: true

  # OWASP Top 10 protection
  owasp_protection:
    sql_injection: true
    xss: true
    csrf: true
    clickjacking: true
    security_headers: true

  notes: |
    Example: Issue "Add user registration"
    - Auto-add: Input validation
    - Auto-add: Password hashing (bcrypt)
    - Auto-add: CSRF protection
    - Confidence: HIGH (security best practices)

# ============================================================================
# 12. AMBIGUITY RESOLUTION STRATEGIES
# ============================================================================
ambiguity:
  # When goal is unclear
  when_goal_unclear:
    default_targets:
      performance: "10% improvement over baseline"
      optimization: "reduce_latency"
      quality: "increase_test_coverage"

    measurement:
      establish_baseline: true
      run_benchmarks: true
      compare_before_after: true

    notes: |
      Example: Issue #1234 "Improve performance"
      - No specific target mentioned
      - Action: Measure baseline, improve 10%
      - Confidence: MEDIUM (assumed target)

  # When scope is unclear
  when_scope_unclear:
    prefer: "smallest_safe_change"
    require_reversibility: true
    add_feature_flag: true

    notes: |
      Example: "Optimize the app"
      - Too broad
      - Action: Focus on most impactful optimization
      - Add feature flag for safe rollback

  # When multiple solutions exist
  when_multiple_solutions:
    decision_criteria:
      - "follows_existing_patterns"
      - "minimizes_breaking_changes"
      - "maximizes_reversibility"
      - "best_performance"

    notes: |
      Example: "Fix slow queries"
      - Solution A: Add index (follows pattern, reversible)
      - Solution B: Denormalize (breaks pattern, hard to reverse)
      - Choose: A (meets more criteria)

# ============================================================================
# 13. TEAM COORDINATION POLICIES
# ============================================================================
team:
  # CI/CD changes
  ci_cd:
    auto_allowed:
      - "add_ci_job"
      - "update_ci_config"
      - "fix_failing_test"
      - "update_dependencies"

    requires_team_sync:
      - "change_ci_platform"           # Jenkins → GitHub Actions
      - "change_deployment_process"
      - "change_branching_strategy"
      - "modify_release_process"

    notes: |
      Example: Issue #6000 "Migrate CI from Jenkins to GitHub Actions"
      - "change_ci_platform" in requires_team_sync
      - Action: Create migration plan + needs approval
      - Don't execute without team coordination

  # Migration strategy
  migrations:
    prefer: "phased_rollout"
    pilot_percentage: 10
    require_rollback_plan: true
    require_documentation: true

  # Breaking changes
  breaking_changes:
    require_approval: true
    require_migration_guide: true
    deprecation_period_days: 90

# ============================================================================
# 14. CONFIDENCE LEVEL ADJUSTMENTS
# ============================================================================
confidence_overrides:
  # Conditions that upgrade confidence
  upgrade_confidence:
    - condition: "follows_existing_pattern"
      from: "MEDIUM"
      to: "HIGH"

    - condition: "policy_explicitly_defined"
      from: "MEDIUM"
      to: "HIGH"

    - condition: "has_test_coverage_gt_80"
      from: "MEDIUM"
      to: "HIGH"

    - condition: "reversible_with_git_revert"
      from: "LOW"
      to: "MEDIUM"

    - condition: "non_breaking_change"
      from: "MEDIUM"
      to: "HIGH"

  # Conditions that downgrade confidence
  downgrade_confidence:
    - condition: "breaking_change"
      from: "HIGH"
      to: "MEDIUM"

    - condition: "affects_security"
      from: "HIGH"
      to: "MEDIUM"
      note: "Security changes need extra review"

    - condition: "no_test_coverage"
      from: "HIGH"
      to: "LOW"

# ============================================================================
# 15. FALLBACK STRATEGIES
# ============================================================================
fallback:
  # When no policy matches
  when_policy_not_defined:
    action: "use_autonomous_guidelines"
    learn: true                  # Add to suggested-policies.yaml
    confidence: "MEDIUM"

    notes: |
      If no explicit policy exists:
      1. Use autonomous-decision-guidelines.md
      2. Log decision with confidence=MEDIUM
      3. Add to suggested-policies.yaml for future policy creation

  # When multiple policies conflict
  when_policies_conflict:
    action: "needs-human"
    reason: "Policy conflict requires human resolution"
    log_conflict: true

    notes: |
      Example: Issue involves both security AND performance
      - security.input_validation says: validate everything
      - performance.api_response_time says: optimize for speed
      - Conflict: Validation may slow down API
      - Action: needs-human to prioritize

  # When policy is ambiguous
  when_policy_ambiguous:
    action: "interpret_conservatively"
    prefer: "safer_option"
    log_interpretation: true

# ============================================================================
# 16. POLICY METADATA & VERSIONING
# ============================================================================
metadata:
  version: "1.0"
  created: "2026-07-16"
  last_modified: "2026-07-16"
  author: "scanales-stack"

  # Policy change log
  changelog:
    - version: "1.0"
      date: "2026-07-16"
      changes: "Initial policy configuration"
      author: "scanales-stack"

  # Review schedule
  review:
    frequency_days: 90
    next_review: "2026-10-14"
    reviewer: "scanales-stack"

# ============================================================================
# 17. EXAMPLE POLICY APPLICATIONS
# ============================================================================
examples:
  issue_1016:
    title: "Large CSS files (homedir.css 49KB, retro-theme.css 54KB)"
    matched_policy: "performance.frontend_bundle_size"
    decision: "Consolidate CSS files"
    rationale: "103KB exceeds max_kb, consolidate to 70KB"
    confidence: "HIGH"
    reversible: "Yes"

  issue_1234:
    title: "Improve login performance"
    matched_policy: "performance.api_response_time"
    decision: "Add DB index + Redis caching"
    rationale: "Baseline 850ms → Target 200ms, applied optimization_order"
    confidence: "HIGH"
    reversible: "Yes"

  issue_1567:
    title: "Implement rate limiting for API"
    matched_policy: "rate_limiting.default_limits"
    decision: "Apply 10 anon / 100 auth / 1000 premium"
    rationale: "No specific limits mentioned, used policy defaults"
    confidence: "HIGH"
    reversible: "Yes"

  issue_5000:
    title: "Update Spring Boot to 3.2"
    matched_policy: "dependencies.frameworks.spring_boot"
    decision: "Create upgrade plan, request approval"
    rationale: "Major version within max (3.x) but requires approval"
    confidence: "MEDIUM"
    reversible: "Yes"
