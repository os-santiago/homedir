  planned: 0

review_schedule:
  initial_review: 2026-06-23
  next_review: 2026-08-23
  review_frequency: BIMONTHLY
  review_triggers:
    - New community feature added
    - XSS or injection vulnerability discovered
    - Major spam incident
    - Community growth milestone (10k+ users)
    - Moderation policy changes
    - Compliance audit scheduled

notes: |
  CRITICAL PRIORITY: COMM-T002 (XSS) must be addressed before public launch.
  Related to Issue #856 (CSP headers) - coordinate implementation.

  Community features are high-risk due to user-generated content. Comprehensive
  input validation, output encoding, and Content Security Policy are mandatory.

  Regular penetration testing focused on XSS, injection, and authorization bypass
  is essential for this domain.

  Consider implementing a bug bounty program with high payouts for XSS and
  privilege escalation vulnerabilities.
