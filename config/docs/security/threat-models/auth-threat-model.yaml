notes: |
  CRITICAL PRIORITY: Authentication is the highest-risk domain. All threats rated
  CRITICAL or HIGH must be addressed before production launch.

  Issue #854 (endpoint authorization matrix) is foundational to AUTH-T003. The matrix
  must be implemented and tested comprehensively. Authorization testing should be
  automated from the matrix specification.

  Credential stuffing (AUTH-T001) is the most likely and impactful threat. Rate limiting,
  MFA, and breach detection are mandatory mitigations.

  Session security (AUTH-T002) requires strict cookie hardening and XSS prevention
  (coordinate with COMM-T002).

  All authentication events must be logged (AUTH-T004) for security monitoring and
  compliance (GDPR, PCI DSS).

  Regular penetration testing focused on authentication and authorization bypass is
  essential. Consider bug bounty program with high payouts for auth vulnerabilities.

  Quarterly security review of authentication controls recommended given criticality.
