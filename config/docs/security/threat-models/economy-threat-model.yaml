notes: |
  CRITICAL PRIORITY: Financial domain is highest-risk for direct monetary loss and
  regulatory penalties. All threats must be addressed before payment processing begins.

  ECON-T001 (card testing/carding) is the most common attack vector. Aggressive rate
  limiting, fraud detection, and 3D Secure are mandatory.

  ECON-T004 (PCI DSS compliance) is non-negotiable. Tokenization is required. NEVER
  store CVV or full PAN. Annual PCI DSS audit required.

  ECON-T002 (price manipulation) requires strict server-side validation. Never trust
  client-provided prices or amounts.

  ECON-T005 (race conditions) is critical for wallet systems. Use database locking
  and atomic transactions.

  Financial audit logging (ECON-T003) is mandatory for compliance (PCI DSS, SOX) and
  chargeback defense.

  Regular penetration testing focused on payment and financial vulnerabilities is
  essential (quarterly recommended).

  Consider cyber insurance for payment fraud and data breach coverage.

  Payment processor relationship is critical. High fraud/chargeback rates can result
  in account termination.

  Implement comprehensive fraud monitoring and real-time alerting on all financial
  operations.

  Monthly financial reconciliation required to detect discrepancies early.
