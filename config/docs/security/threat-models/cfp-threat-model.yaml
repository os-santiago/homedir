notes: |
  CRITICAL PRIORITY: CFP-T004 (proposal confidentiality) must be addressed before
  any CFP opens. Unauthorized access to proposals is the highest risk for this domain.

  Blind review integrity is essential for fair evaluation. All reviewer endpoints
  must enforce speaker identity redaction.

  Consider implementing a bug bounty program specifically for CFP confidentiality
