notes: |
  CRITICAL PRIORITY: Administrative functions are the highest-impact domain. A single
  compromised admin account can lead to total platform compromise.

  ADMIN-T001 (admin account compromise) is the entry point for most admin-related
  attacks. Mandatory MFA with hardware tokens is non-negotiable for admin accounts.

  ADMIN-T003 (audit logging) is foundational for security monitoring, incident response,
  and compliance. All admin actions must be logged comprehensively.

  ADMIN-T004 (data exfiltration) represents the highest data breach risk. Export
  functions must have strict approval workflows and monitoring.

  Insider threat is a significant concern for this domain. Assume some admins may be
  malicious or compromised. Defense in depth, separation of duties, and comprehensive
  logging are essential.

  Consider implementing a Privileged Access Management (PAM) solution for admin access.

  Regular security reviews of admin accounts and permissions (monthly) are required.

  All admin endpoints must be included in penetration testing scope.

  Admin security awareness training should be conducted quarterly at minimum.
