legal_privacy_page_title=Privacy Policy · Homedir
legal_privacy_heading=Application Privacy Policy
legal_privacy_last_updated=Last updated: March 6, 2026
legal_privacy_intro=This policy describes how HomeDir processes personal data for community identity, events, and collaboration features in Chile.
legal_privacy_data_title=Controller and Data Categories
legal_privacy_data_body=HomeDir, operated by the OpenSourceSantiago community, processes account identity data, linked integration metadata (Google/GitHub/Discord), usage activity signals, and content submitted by users.
legal_privacy_use_title=Purposes and Legal Basis
legal_privacy_use_body=Data is processed to operate accounts, events, CFP workflows, community interactions, moderation, security controls, and service metrics, based on user consent, service operation needs, and legitimate security interests.
legal_privacy_storage_title=Retention, Security, and International Services
legal_privacy_storage_body=Data is stored in persistent systems managed by HomeDir operators with backups, access controls, and operational safeguards. Some integrations may involve international providers selected by users.
legal_privacy_third_title=Third-Party Integrations and Sharing
legal_privacy_third_body=When users connect external providers, HomeDir receives only required metadata for enabled features and does not sell personal data. Limited processing by technical operators may occur under platform operation duties.
legal_privacy_rights_title=Your Rights in Chile
legal_privacy_rights_body=Users can request access, correction, deletion, portability, and objection where applicable, and can unlink integrations. Requests can be submitted through official community channels and the contact page (/contacto).
legal_terms_page_title=Terms of Service · Homedir
legal_terms_heading=Application Terms of Service
legal_terms_last_updated=Last updated: March 6, 2026
legal_terms_intro=By using HomeDir, users accept these terms and agree to responsible use aligned with community purpose and applicable Chilean law.
legal_terms_use_title=Service Scope and Acceptable Use
legal_terms_use_body=Users must not abuse APIs, disrupt services, automate spam, bypass security controls, or publish harmful/illegal content. Community moderation and safety rules are mandatory.
legal_terms_accounts_title=Accounts, Access, and Identity
legal_terms_accounts_body=Users are responsible for safeguarding linked accounts and actions under authenticated identity. HomeDir may limit or suspend access to protect platform integrity and community safety.
legal_terms_content_title=User Content, License, and Moderation
legal_terms_content_body=Users retain ownership of submitted content and grant HomeDir a non-exclusive permission to store, moderate, and display it inside platform features. Content that violates rules may be restricted or removed.
legal_terms_availability_title=Availability and Liability Limits
legal_terms_availability_body=HomeDir is an evolving service. Operators may apply maintenance windows, quotas, and operational controls. Service continuity is managed with best effort and no uninterrupted availability guarantee.
legal_terms_changes_title=Changes, Consumer Information, and Jurisdiction
legal_terms_changes_body=These terms may be updated and become effective when published on this page. HomeDir publishes relevant service conditions transparently and applies Chilean law, with jurisdiction in Santiago, Chile.
