campaigns_admin_process_page_overview_title=Flujo de campañas
campaigns_admin_process_page_overview_heading=Ejecuta campañas en cuatro pasos claros
campaigns_admin_process_page_overview_intro=Parte aquí si solo quieres publicar una novedad o avance de la plataforma sin navegar toda la profundidad operativa.
campaigns_admin_process_page_content_title=Paso 1
campaigns_admin_process_page_content_heading=Selecciona el contenido a publicar
campaigns_admin_process_page_content_intro=Revisa los borradores disponibles, filtra la cola y deja solo los elementos que quieres mover a publicación.
campaigns_admin_process_page_channels_title=Paso 2
campaigns_admin_process_page_channels_heading=Elige el canal de publicación
campaigns_admin_process_page_channels_intro=Activa solo los canales que quieres usar y prepara el canal piloto antes de publicar.
