legal_privacy_data_body=HomeDir, operado por la comunidad OpenSourceSantiago, procesa datos de identidad de la cuenta, metadatos de integración vinculados (Google/GitHub/Discord), señales de actividad de uso y contenido enviado por los usuarios.
legal_privacy_data_title=Responsable y categorías de datos
legal_privacy_heading=Política de privacidad de la aplicación
legal_privacy_intro=Esta política describe cómo HomeDir procesa datos personales para identidad comunitaria, eventos y funciones de colaboración en Chile.
legal_privacy_last_updated=Última actualización: 6 de marzo de 2026
legal_privacy_page_title=Política de privacidad · Homedir
legal_privacy_rights_body=Los usuarios pueden solicitar acceso, corrección, eliminación, portabilidad y objeción cuando corresponda, y pueden desvincular integraciones. Las solicitudes se pueden enviar a través de los canales oficiales de la comunidad y la página de contacto (/contacto).
legal_privacy_rights_title=Tus derechos en Chile
legal_privacy_storage_body=Los datos se almacenan en sistemas persistentes administrados por HomeDir operadores con copias de seguridad, controles de acceso y salvaguardias operativas. Algunas integraciones pueden involucrar proveedores internacionales seleccionados por los usuarios.
legal_privacy_storage_title=Retención, Seguridad y Servicios Internacionales
legal_privacy_third_body=Cuando los usuarios conectan proveedores externos, HomeDir recibe solo los metadatos necesarios para las funciones habilitadas y no vende datos personales. Es posible que los operadores técnicos realicen un procesamiento limitado en el marco de las tareas de operación de la plataforma.
legal_privacy_third_title=Integraciones y uso compartido de terceros
legal_privacy_use_body=Los datos se procesan para operar cuentas, eventos, CFP flujos de trabajo, interacciones comunitarias, moderación, controles de seguridad y métricas de servicio, según el consentimiento del usuario, las necesidades de operación del servicio y los intereses legítimos de seguridad.
legal_privacy_use_title=Finalidades y Base Legal
legal_terms_accounts_body=Los usuarios son responsables de salvaguardar las cuentas y acciones vinculadas bajo una identidad autenticada. HomeDir puede limitar o suspender el acceso para proteger la integridad de la plataforma y la seguridad de la comunidad.
legal_terms_accounts_title=Cuentas, acceso e identidad
legal_terms_availability_body=HomeDir es un servicio en evolución. Los operadores pueden aplicar ventanas de mantenimiento, cuotas y controles operativos. La continuidad del servicio se gestiona con el mejor esfuerzo y sin garantía de disponibilidad ininterrumpida.
legal_terms_availability_title=Límites de disponibilidad y responsabilidad
legal_terms_changes_body=Estos términos pueden actualizarse y entrar en vigencia cuando se publiquen en esta página. HomeDir publica las condiciones de servicio relevantes de forma transparente y aplica la ley chilena, con jurisdicción en Santiago, Chile.
legal_terms_changes_title=Cambios, información al consumidor y jurisdicción
legal_terms_content_body=Los usuarios conservan la propiedad del contenido enviado y otorgan a HomeDir un permiso no exclusivo para almacenarlo, moderarlo y mostrarlo dentro de las funciones de la plataforma. El contenido que viole las reglas puede restringirse o eliminarse.
legal_terms_content_title=Contenido de usuario, licencia y moderación
legal_terms_heading=Términos de servicio de la aplicación
legal_terms_intro=Al utilizar HomeDir, los usuarios aceptan estos términos y se comprometen a un uso responsable alineado con el propósito comunitario y la ley chilena aplicable.
legal_terms_last_updated=Última actualización: 6 de marzo de 2026
legal_terms_page_title=Términos de servicio · Homedir
legal_terms_use_body=Los usuarios no deben abusar de APIs, interrumpir servicios, automatizar spam, eludir controles de seguridad ni publicar contenido dañino/ilegal. Las reglas de seguridad y moderación comunitaria son obligatorias.
legal_terms_use_title=Alcance del servicio y uso aceptable
