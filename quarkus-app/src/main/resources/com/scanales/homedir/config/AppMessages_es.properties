campaigns_admin_process_step_channels_heading=Decide dónde se publicará
campaigns_admin_process_step_channels_intro=Revisa los canales disponibles, deja activo solo el canal que usarás y confirma el piloto si corresponde.
campaigns_admin_process_step_channels_action=Abrir canales
campaigns_admin_process_step_publish_heading=Prepara el envío final
campaigns_admin_process_step_publish_intro=Inspecciona el preview del mensaje, programa el borrador y ejecuta la publicación solo cuando el canal esté listo.
