campaigns_admin_process_page_board_intro=Usa el board cuando quieras un dashboard visual único para borradores, listos, programados, publicados y bloqueados.
campaigns_admin_process_overview_title=Ruta sugerida
campaigns_admin_process_overview_intro=Sigue esta secuencia para publicar una actualización de HomeDir con la menor fricción posible.
