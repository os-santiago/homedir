home_today_card_board_chip=Community Board
home_today_card_board_desc=miembros listados en HomeDir users
legal_privacy_data_body=HomeDir, operado por la comunidad OpenSourceSantiago, trata datos de identidad de cuenta, metadatos de integraciones vinculadas (Google/GitHub/Discord), señales de actividad de uso y contenido enviado por usuarios.
legal_privacy_data_title=Responsable y categorías de datos
legal_privacy_heading=Política de Privacidad de la aplicación
legal_privacy_intro=Esta política describe cómo HomeDir trata datos personales para funciones de identidad comunitaria, eventos y colaboración en Chile.
legal_privacy_last_updated=Última actualización: 6 de marzo de 2026
legal_privacy_page_title=Política de Privacidad · Homedir
legal_privacy_rights_body=Puedes solicitar acceso, rectificación, eliminación, portabilidad y oposición cuando corresponda, además de desvincular integraciones. Las solicitudes se pueden gestionar por canales oficiales de la comunidad y la página de contacto (/contacto).
legal_privacy_rights_title=Tus derechos en Chile
legal_privacy_storage_body=Los datos se almacenan en sistemas persistentes administrados por operadores de HomeDir con respaldos, controles de acceso y resguardos operacionales. Algunas integraciones pueden involucrar proveedores internacionales elegidos por el usuario.
legal_privacy_storage_title=Conservación, seguridad y servicios internacionales
legal_privacy_third_body=Cuando conectas proveedores externos, HomeDir recibe solo metadatos necesarios para las funciones habilitadas y no vende datos personales. Puede existir tratamiento limitado por operadores técnicos para fines de operación de la plataforma.
legal_privacy_third_title=Integraciones de terceros y comunicación de datos
legal_privacy_use_body=Los datos se tratan para operar cuentas, eventos, flujos de CFP, interacciones comunitarias, moderación, controles de seguridad y métricas del servicio, sobre la base de consentimiento, operación del servicio e interés legítimo de seguridad.
legal_privacy_use_title=Finalidades y base legal
legal_terms_accounts_body=Cada usuario es responsable de proteger sus cuentas vinculadas y de las acciones realizadas bajo su identidad autenticada. HomeDir puede limitar o suspender acceso para proteger la integridad del servicio y la seguridad comunitaria.
legal_terms_accounts_title=Cuentas, acceso e identidad
legal_terms_availability_body=HomeDir es un servicio en evolución. Los operadores pueden aplicar ventanas de mantenimiento, cuotas y controles operacionales. La continuidad del servicio se gestiona bajo mejor esfuerzo y sin garantía de disponibilidad ininterrumpida.
legal_terms_availability_title=Disponibilidad y límites de responsabilidad
legal_terms_changes_body=Estas condiciones pueden actualizarse y rigen desde su publicación en esta página. HomeDir informa condiciones relevantes del servicio de forma transparente y aplica ley chilena, con jurisdicción en Santiago de Chile.
legal_terms_changes_title=Cambios, información al consumidor y jurisdicción
legal_terms_content_body=Conservas la titularidad del contenido enviado y otorgas a HomeDir una autorización no exclusiva para almacenarlo, moderarlo y mostrarlo en funcionalidades de la plataforma. El contenido que incumpla reglas puede ser restringido o removido.
legal_terms_content_title=Contenido de usuario, licencia y moderación
legal_terms_heading=Condiciones del servicio de la aplicación
legal_terms_intro=Al usar HomeDir aceptas estas condiciones y te comprometes a un uso responsable, alineado con el propósito de la comunidad y la normativa chilena aplicable.
legal_terms_last_updated=Última actualización: 6 de marzo de 2026
legal_terms_page_title=Condiciones del servicio · Homedir
legal_terms_use_body=No debes abusar de APIs, interrumpir servicios, automatizar spam, eludir controles de seguridad ni publicar contenido dañino o ilegal. Las reglas de moderación y seguridad comunitaria son obligatorias.
legal_terms_use_title=Alcance del servicio y uso aceptable
