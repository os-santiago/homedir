name: PR Quality — Suite

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: style
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.5.1

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check code formatting (Spotless)
        working-directory: quarkus-app
        run: ./mvnw spotless:check -B -q

  static:
    name: static
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.5.1

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Static analysis (compile with lint)
        working-directory: quarkus-app
        run: ./mvnw compile -B -q -Dmaven.compiler.showWarnings=true

  arch:
    name: arch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.5.1

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Architecture validation (enforcer)
        working-directory: quarkus-app
        run: ./mvnw enforcer:enforce -B -q

  tests_cov:
    name: tests_cov
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.5.1

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Tests with coverage
        working-directory: quarkus-app
        run: ./mvnw verify -B -Pcoverage -Dsurefire.rerunFailingTestsCount=1

  deps:
    name: deps
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.5.1

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dependency analysis
        working-directory: quarkus-app
        run: ./mvnw dependency:analyze -B -q

  quality-summary:
    name: Quality Summary
    needs: [style, static, arch, tests_cov, deps]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize quality gates
        run: |
          echo "### PR Quality Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| style | ${{ needs.style.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| static | ${{ needs.static.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| arch | ${{ needs.arch.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| tests_cov | ${{ needs.tests_cov.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| deps | ${{ needs.deps.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.style.result }}" != "success" ] || \
             [ "${{ needs.static.result }}" != "success" ] || \
             [ "${{ needs.arch.result }}" != "success" ] || \
             [ "${{ needs.tests_cov.result }}" != "success" ] || \
             [ "${{ needs.deps.result }}" != "success" ]; then
            echo "**Result:** FAILED - One or more PR quality checks did not pass" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "**Result:** PASSED - All PR quality checks passed" >> "$GITHUB_STEP_SUMMARY"
