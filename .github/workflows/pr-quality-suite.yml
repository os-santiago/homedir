name: PR Quality — Suite

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: style
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@b5737a493b0e2f25fbaec9818877353d2e46a0d4 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@7e61d7042eee934e81b2c3ababfe491d46e29a14 # v5.0.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check code formatting (Spotless)
        working-directory: quarkus-app
        run: ./mvnw spotless:check -B -q

  static:
    name: static
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@b5737a493b0e2f25fbaec9818877353d2e46a0d4 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@7e61d7042eee934e81b2c3ababfe491d46e29a14 # v5.0.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Static analysis (compile with lint)
        working-directory: quarkus-app
        run: ./mvnw compile -B -q -Dmaven.compiler.showWarnings=true

  arch:
    name: arch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@b5737a493b0e2f25fbaec9818877353d2e46a0d4 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@7e61d7042eee934e81b2c3ababfe491d46e29a14 # v5.0.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Architecture validation (enforcer)
        working-directory: quarkus-app
        run: ./mvnw enforcer:enforce -B -q

  tests_cov:
    name: tests_cov
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@b5737a493b0e2f25fbaec9818877353d2e46a0d4 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@7e61d7042eee934e81b2c3ababfe491d46e29a14 # v5.0.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Tests with coverage
        working-directory: quarkus-app
        run: ./mvnw verify -B -Pcoverage -Dsurefire.rerunFailingTestsCount=1

  deps:
    name: deps
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@b5737a493b0e2f25fbaec9818877353d2e46a0d4 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@7e61d7042eee934e81b2c3ababfe491d46e29a14 # v5.0.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Dependency analysis
        working-directory: quarkus-app
        run: ./mvnw dependency:analyze -B -q
