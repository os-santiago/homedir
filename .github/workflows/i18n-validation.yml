name: I18n Validation

on:
  pull_request:
    paths:
      - 'quarkus-app/src/main/resources/i18n*.properties'
      - 'quarkus-app/src/main/resources/templates/**'
      - 'scripts/validate_i18n.py'
      - '.github/workflows/i18n-validation.yml'
  push:
    branches:
      - main
    paths:
      - 'quarkus-app/src/main/resources/i18n*.properties'
      - 'quarkus-app/src/main/resources/templates/**'
      - 'scripts/validate_i18n.py'
      - '.github/workflows/i18n-validation.yml'

jobs:
  validate-i18n:
    runs-on: ubuntu-latest
    name: Validate i18n files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate i18n files
        run: python3 scripts/validate_i18n.py

      - name: Validation result
        if: success()
        run: echo "✓ I18n validation passed successfully"
