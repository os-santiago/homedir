name: PR CI (Build, Native, SBOM/Scan)

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: sbom
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@b5737a493b0e2f25fbaec9818877353d2e46a0d4 # v6.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@7e61d7042eee934e81b2c3ababfe491d46e29a14 # v5.0.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and generate SBOM
        working-directory: quarkus-app
        run: ./mvnw verify -B -q -DskipTests -Dcyclonedx.skip=false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea0dfa9edb5b0fd63f38f37e0f8f08c10ef4b8fb # v4.6.1
        with:
          name: sbom-${{ github.sha }}
          path: quarkus-app/target/bom.json
          retention-days: 30
