name: PR CI (Build, Native, SBOM/Scan)

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: sbom
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.5.1

      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and generate SBOM
        working-directory: quarkus-app
        run: ./mvnw verify -B -q -DskipTests -Dcyclonedx.skip=false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          path: quarkus-app/target/bom.json
          retention-days: 30

  ci-summary:
    name: CI Summary
    needs: [sbom]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize CI gates
        run: |
          echo "### PR CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gate | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| sbom | ${{ needs.sbom.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ needs.sbom.result }}" != "success" ]; then
            echo "**Result:** FAILED - SBOM generation did not pass" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "**Result:** PASSED - SBOM generation passed" >> "$GITHUB_STEP_SUMMARY"
