name: Production Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_level:
        description: 'Release Level (auto calculates if empty)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major
      skip_deploy:
        description: 'Skip deployment (build and verify only, for QA)'
        required: false
        default: false
        type: boolean
      skip_health_gate:
        description: 'Skip pipeline health gate (emergency override)'
        required: false
        default: false
        type: boolean

concurrency:
  group: production-release-main
  cancel-in-progress: false

jobs:
  release:
    name: Tag & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip release]') }}
    permissions:
      contents: write
      packages: write
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_SSH_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_SSH_USER }}
      DEPLOY_PORT: ${{ vars.DEPLOY_SSH_PORT }}
      DEPLOY_COMMAND: ${{ vars.DEPLOY_SSH_COMMAND }}
      HEALTHCHECK_URL: ${{ vars.DEPLOY_HEALTHCHECK_URL }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
      DEPLOY_SSH_STRICT_HOST_KEY_CHECKING: ${{ vars.DEPLOY_SSH_STRICT_HOST_KEY_CHECKING }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Required for changelog/version calc

      - name: Pipeline Health Gate
        id: health_gate
        if: ${{ !inputs.skip_health_gate }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          HEALTH_GATE_PR_THRESHOLD: ${{ vars.HEALTH_GATE_PR_THRESHOLD || '90' }}
          HEALTH_GATE_RELEASE_THRESHOLD: ${{ vars.HEALTH_GATE_RELEASE_THRESHOLD || '90' }}
        run: |
          set -euo pipefail
          python3 scripts/ci/pipeline_health_report.py \
            --repo "${GITHUB_REPOSITORY}" \
            --days 7 \
            --pr-threshold "${HEALTH_GATE_PR_THRESHOLD}" \
            --release-threshold "${HEALTH_GATE_RELEASE_THRESHOLD}" \
            --output-json health-report.json \
            --output-md health-report.md
          status="$(jq -r '.status' health-report.json)"
          pr_rate="$(jq -r '.pr_validation.success_rate' health-report.json)"
          rel_rate="$(jq -r '.production_release.success_rate' health-report.json)"
          cat health-report.md >> "${GITHUB_STEP_SUMMARY}"
          if [ "${status}" = "warn" ]; then
            echo "::warning::Pipeline health below threshold - PR: ${pr_rate}% (threshold: ${HEALTH_GATE_PR_THRESHOLD}%), Release: ${rel_rate}% (threshold: ${HEALTH_GATE_RELEASE_THRESHOLD}%)"
            echo "health_warning=true" >> "$GITHUB_OUTPUT"
          else
            echo "health_warning=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Health Gate Override Notice
        if: ${{ inputs.skip_health_gate }}
        run: |
          echo "::warning::Pipeline health gate was skipped via manual override (--skip-health-gate=true)"
          {
            echo "# Pipeline Health Gate: SKIPPED"
            echo ""
            echo "⚠️ **Emergency override active** - health gate was manually bypassed."
            echo ""
            echo "This release proceeded without verifying recent pipeline stability."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Build & Tests (Release Gate)
        working-directory: quarkus-app
        run: |
          ../scripts/ci/retry.sh \
            ./mvnw clean verify -B \
            -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Calculate Next Version (dry run)
        id: version_calc
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          default_bump: patch
          custom_release_rules: feat:minor,fix:patch,chore:patch,refactor:patch,perf:patch
          release_branches: main
          tag_prefix: v
          dry_run: true

      - name: Resolve release version and tag
        id: release_meta
        env:
          CALCULATED_VERSION: ${{ steps.version_calc.outputs.new_version }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          existing_tag="$(git tag --points-at "${GITHUB_SHA}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [ -n "${existing_tag}" ]; then
            release_tag="${existing_tag}"
            release_version="${existing_tag#v}"
            reused_tag="true"
            echo "Reusing existing tag ${release_tag} for ${GITHUB_SHA}."
          else
            release_version="${CALCULATED_VERSION}"
            release_tag="v${release_version}"
            reused_tag="false"
            echo "Resolved new release tag ${release_tag}."
          fi
          echo "new_version=${release_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "reused_tag=${reused_tag}" >> "$GITHUB_OUTPUT"

      - name: Sync pom.xml revision for release tag
        id: sync_pom
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.new_version }}
        run: |
          set -euo pipefail
          sed -i -E "s#<revision>[^<]+</revision>#<revision>${RELEASE_VERSION}</revision>#" quarkus-app/pom.xml
          if git diff --quiet -- quarkus-app/pom.xml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "pom.xml already aligned with ${RELEASE_VERSION}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quarkus-app/pom.xml
          git commit -m "chore(release): sync pom revision to ${RELEASE_VERSION} [skip release]"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build with Maven (production build)
        working-directory: quarkus-app
        run: ./mvnw package -B -Drevision=${{ steps.release_meta.outputs.new_version }}

      - name: Resolve registry image names
        id: registry_meta
        env:
          PRIMARY_IMAGE: ${{ vars.REGISTRY }}/${{ vars.IMAGE_NAME }}
          IMAGE_NAME_INPUT: ${{ vars.IMAGE_NAME }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner_lower="$(echo "${REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_name_lower="$(echo "${IMAGE_NAME_INPUT}" | tr '[:upper:]' '[:lower:]')"
          ghcr_image="ghcr.io/${owner_lower}/${image_name_lower}"
          echo "primary_image=${PRIMARY_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ghcr_image=${ghcr_image}" >> "$GITHUB_OUTPUT"

      - name: Login to Quay.io
        env:
          QUAY_USERNAME: ${{ vars.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${QUAY_USERNAME:-}" ] || [ -z "${QUAY_PASSWORD:-}" ]; then
            echo "::warning::Quay credentials not configured; primary registry push will be skipped."
            exit 0
          fi
          printf '%s' "$QUAY_PASSWORD" | docker login quay.io -u "$QUAY_USERNAME" --password-stdin

      - name: Login to GitHub Container Registry
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Build and Push Docker Image
        working-directory: quarkus-app
        env:
          PRIMARY_IMAGE: ${{ steps.registry_meta.outputs.primary_image }}
          GHCR_IMAGE: ${{ steps.registry_meta.outputs.ghcr_image }}
          QUAY_USERNAME: ${{ vars.QUAY_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_PASSWORD }}
          TAG: ${{ steps.release_meta.outputs.new_version }}
        run: |
          set -euo pipefail
          docker build -f src/main/docker/Dockerfile.jvm \
            -t $PRIMARY_IMAGE:latest \
            -t $PRIMARY_IMAGE:$TAG \
            -t $GHCR_IMAGE:latest \
            -t $GHCR_IMAGE:$TAG .

          primary_push_ok="false"
          if [ -n "${QUAY_USERNAME:-}" ] && [ -n "${QUAY_PASSWORD:-}" ]; then
            if RETRY_ATTEMPTS=3 RETRY_SLEEP_SECONDS=10 ../scripts/ci/retry.sh docker push $PRIMARY_IMAGE:$TAG \
              && RETRY_ATTEMPTS=3 RETRY_SLEEP_SECONDS=10 ../scripts/ci/retry.sh docker push $PRIMARY_IMAGE:latest; then
              primary_push_ok="true"
            else
              echo "::warning::Primary registry push failed for ${PRIMARY_IMAGE}; continuing with GHCR fallback."
            fi
          else
            echo "::warning::Skipping primary registry push because Quay credentials are not configured."
          fi

          ghcr_push_ok="false"
          if RETRY_ATTEMPTS=3 RETRY_SLEEP_SECONDS=10 ../scripts/ci/retry.sh docker push $GHCR_IMAGE:$TAG \
            && RETRY_ATTEMPTS=3 RETRY_SLEEP_SECONDS=10 ../scripts/ci/retry.sh docker push $GHCR_IMAGE:latest; then
            ghcr_push_ok="true"
          else
            echo "::warning::GHCR push failed for ${GHCR_IMAGE}."
          fi

          if [ "$primary_push_ok" != "true" ] && [ "$ghcr_push_ok" != "true" ]; then
            echo "::error::No registry push succeeded."
            exit 1
          fi

      - name: Create release tag
        id: tag_version
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.new_version }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.new_tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            existing_tag_sha="$(git rev-list -n 1 "${RELEASE_TAG}")"
            if [ "${existing_tag_sha}" != "${GITHUB_SHA}" ]; then
              echo "::error::Tag ${RELEASE_TAG} already exists on ${existing_tag_sha}, expected ${GITHUB_SHA}"
              exit 1
            fi
            echo "Tag ${RELEASE_TAG} already exists for current commit; reusing."
          else
            git tag "${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi
          echo "new_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        id: release_notes
        env:
          TAG: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Find previous tag
          prev_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | grep -v "^${TAG}$" | head -n1 || true)"

          if [ -z "${prev_tag}" ]; then
            echo "No previous tag found. This is the first release."
            echo '## First Release' > release_notes.txt
            echo '' >> release_notes.txt
            echo 'Initial production release.' >> release_notes.txt
            cat release_notes.txt
            exit 0
          fi

          # Get commits between tags
          commits="$(git log --oneline --no-merges "${prev_tag}..HEAD" --format='%s|||%an|||%h' || true)"

          if [ -z "${commits}" ]; then
            echo "## No Changes" > release_notes.txt
            echo '' >> release_notes.txt
            echo "Sin cambios nuevos desde ${prev_tag}." >> release_notes.txt
            cat release_notes.txt
            exit 0
          fi

          # Initialize release notes
          echo "## Changes since ${prev_tag}" > release_notes.txt
          echo '' >> release_notes.txt

          # Classify commits by conventional commit type
          echo "${commits}" | grep -E '^feat[:(]' | while IFS='|||' read -r subject author hash; do
            pr_num="$(echo "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
            if [ -n "${pr_num}" ]; then
              echo "- ${subject} (@${author}) #${pr_num}" >> feat.txt
            else
              echo "- ${subject} (@${author})" >> feat.txt
            fi
          done || true

          echo "${commits}" | grep -E '^fix[:(]' | while IFS='|||' read -r subject author hash; do
            pr_num="$(echo "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
            if [ -n "${pr_num}" ]; then
              echo "- ${subject} (@${author}) #${pr_num}" >> fix.txt
            else
              echo "- ${subject} (@${author})" >> fix.txt
            fi
          done || true

          echo "${commits}" | grep -E '^perf[:(]' | while IFS='|||' read -r subject author hash; do
            pr_num="$(echo "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
            if [ -n "${pr_num}" ]; then
              echo "- ${subject} (@${author}) #${pr_num}" >> perf.txt
            else
              echo "- ${subject} (@${author})" >> perf.txt
            fi
          done || true

          echo "${commits}" | grep -E '^refactor[:(]' | while IFS='|||' read -r subject author hash; do
            pr_num="$(echo "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
            if [ -n "${pr_num}" ]; then
              echo "- ${subject} (@${author}) #${pr_num}" >> refactor.txt
            else
              echo "- ${subject} (@${author})" >> refactor.txt
            fi
          done || true

          echo "${commits}" | grep -E '^docs[:(]' | while IFS='|||' read -r subject author hash; do
            pr_num="$(echo "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
            if [ -n "${pr_num}" ]; then
              echo "- ${subject} (@${author}) #${pr_num}" >> docs.txt
            else
              echo "- ${subject} (@${author})" >> docs.txt
            fi
          done || true

          echo "${commits}" | grep -vE '^(feat|fix|perf|refactor|docs|chore|test|ci|build|style)[:(]' | while IFS='|||' read -r subject author hash; do
            pr_num="$(echo "${subject}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p')"
            if [ -n "${pr_num}" ]; then
              echo "- ${subject} (@${author}) #${pr_num}" >> other.txt
            else
              echo "- ${subject} (@${author})" >> other.txt
            fi
          done || true

          # Append sections to release notes
          if [ -f feat.txt ]; then
            echo '### ✨ Features' >> release_notes.txt
            cat feat.txt >> release_notes.txt
            echo '' >> release_notes.txt
          fi

          if [ -f fix.txt ]; then
            echo '### 🐛 Bug Fixes' >> release_notes.txt
            cat fix.txt >> release_notes.txt
            echo '' >> release_notes.txt
          fi

          if [ -f perf.txt ]; then
            echo '### ⚡ Performance' >> release_notes.txt
            cat perf.txt >> release_notes.txt
            echo '' >> release_notes.txt
          fi

          if [ -f refactor.txt ]; then
            echo '### ♻️ Refactoring' >> release_notes.txt
            cat refactor.txt >> release_notes.txt
            echo '' >> release_notes.txt
          fi

          if [ -f docs.txt ]; then
            echo '### 📝 Documentation' >> release_notes.txt
            cat docs.txt >> release_notes.txt
            echo '' >> release_notes.txt
          fi

          if [ -f other.txt ]; then
            echo '### 🔧 Other Changes' >> release_notes.txt
            cat other.txt >> release_notes.txt
            echo '' >> release_notes.txt
          fi

          cat release_notes.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag_version.outputs.new_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TITLE="Release ${TAG}"
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$REPO" --title "$TITLE" --notes-file release_notes.txt
          else
            gh release create "$TAG" --repo "$REPO" --title "$TITLE" --notes-file release_notes.txt
          fi

      - name: Resolve deploy configuration
        id: deploy_config
        env:
          SKIP_DEPLOY_INPUT: ${{ github.event.inputs.skip_deploy }}
        run: |
          set -euo pipefail
          enabled="false"
          if [ "${SKIP_DEPLOY_INPUT:-false}" = "true" ]; then
            echo "::notice::Deployment skipped via skip_deploy input (QA verification mode)."
          elif [ -n "${DEPLOY_HOST:-}" ] && [ -n "${DEPLOY_USER:-}" ] && [ -n "${DEPLOY_SSH_PRIVATE_KEY:-}" ]; then
            enabled="true"
          fi
          echo "enabled=${enabled}" >> "$GITHUB_OUTPUT"

      - name: Start SSH agent
        if: ${{ steps.deploy_config.outputs.enabled == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Prepare SSH known_hosts
        if: ${{ steps.deploy_config.outputs.enabled == 'true' }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci/ssh-deploy-lib.sh
          source ./scripts/ci/ssh-deploy-lib.sh
          validate_required_vars DEPLOY_HOST DEPLOY_USER
          ssh_setup_known_hosts "$DEPLOY_HOST" "${DEPLOY_PORT:-22}" "${DEPLOY_SSH_KNOWN_HOSTS:-}"

      - name: Deploy to VPS via SSH
        id: deploy_ssh
        if: ${{ steps.deploy_config.outputs.enabled == 'true' }}
        continue-on-error: true
        timeout-minutes: 4
        env:
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci/ssh-deploy-lib.sh
          source ./scripts/ci/ssh-deploy-lib.sh
          cmd="${DEPLOY_COMMAND:-/usr/local/bin/homedir-update.sh}"
          ssh_exec "DEPLOY_TRIGGER=github-actions ${cmd} ${RELEASE_TAG}" \
            "$DEPLOY_HOST" \
            "$DEPLOY_USER" \
            "${DEPLOY_PORT:-22}"

      - name: Verify production healthcheck
        if: ${{ steps.deploy_config.outputs.enabled == 'true' }}
        env:
          DEPLOY_SSH_OUTCOME: ${{ steps.deploy_ssh.outcome }}
        run: |
          set -euo pipefail
          url="${HEALTHCHECK_URL:-https://homedir.opensourcesantiago.io/q/health}"
          attempts=18
          if [ "${DEPLOY_SSH_OUTCOME:-success}" != "success" ]; then
            attempts=36
            echo "::warning::SSH deploy did not complete successfully; waiting longer for VPS fallback auto-deploy."
          fi
          for attempt in $(seq 1 "$attempts"); do
            if curl -fsS "$url" >/dev/null; then
              echo "healthcheck passed: $url"
              exit 0
            fi
            sleep 10
          done
          echo "healthcheck failed: $url" >&2
          exit 1

      - name: Emit insights ingest events (production release)
        if: ${{ success() && steps.deploy_config.outputs.enabled == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INSIGHTS_INGEST_BASE_URL: ${{ vars.INSIGHTS_INGEST_BASE_URL }}
          INSIGHTS_INGEST_KEY: ${{ secrets.INSIGHTS_INGEST_KEY }}
          RELEASE_TAG: ${{ steps.tag_version.outputs.new_tag }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          HEAD_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          pr_number="$(echo "${HEAD_COMMIT_MESSAGE:-}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p' | head -n1)"
          if [ -n "${pr_number}" ]; then
            pr_json="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" || true)"
            pr_title="$(echo "${pr_json}" | jq -r '.title // empty' 2>/dev/null || true)"
            pr_head_ref="$(echo "${pr_json}" | jq -r '.head.ref // empty' 2>/dev/null || true)"
            pr_labels_json="$(echo "${pr_json}" | jq -c '[.labels[]?.name]' 2>/dev/null || echo '[]')"
            if [ -z "${pr_title}" ]; then
              pr_title="PR #${pr_number}"
            fi
            initiative_id="$(bash scripts/ci/insights_resolve_initiative.sh "${pr_number}" "${pr_title}" "${pr_head_ref}" "${pr_labels_json}")"
            title="${pr_title}"
          else
            initiative_id="release-${RELEASE_TAG}"
            title="${HEAD_COMMIT_MESSAGE:-Release ${RELEASE_TAG}}"
          fi
          started_at="${HEAD_COMMIT_TIMESTAMP:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}"
          bash scripts/ci/insights_ingest.sh start \
            "${initiative_id}" \
            "${title}" \
            "${started_at}" \
            "source=production-release" \
            "release_tag=${RELEASE_TAG}" \
            "sha=${HEAD_SHA}" \
            "run_id=${RUN_ID}"
          if [ -n "${pr_number}" ]; then
            bash scripts/ci/insights_ingest.sh event \
              "${initiative_id}" \
              "PR_MERGED" \
              "source=production-release" \
              "pr=${pr_number}" \
              "release_tag=${RELEASE_TAG}" \
              "sha=${HEAD_SHA}" \
              "run_id=${RUN_ID}"
          fi
          bash scripts/ci/insights_ingest.sh event \
            "${initiative_id}" \
            "PRODUCTION_VERIFIED" \
            "source=production-release" \
            "release_tag=${RELEASE_TAG}" \
            "sha=${HEAD_SHA}" \
            "run_id=${RUN_ID}"

      - name: Emit insights ingest events (production release failed)
        if: ${{ failure() }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INSIGHTS_INGEST_BASE_URL: ${{ vars.INSIGHTS_INGEST_BASE_URL }}
          INSIGHTS_INGEST_KEY: ${{ secrets.INSIGHTS_INGEST_KEY }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          HEAD_COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          HEAD_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          pr_number="$(echo "${HEAD_COMMIT_MESSAGE:-}" | sed -nE 's/.*\(#([0-9]+)\).*/\1/p' | head -n1)"
          if [ -n "${pr_number}" ]; then
            pr_json="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" || true)"
            pr_title="$(echo "${pr_json}" | jq -r '.title // empty' 2>/dev/null || true)"
            pr_head_ref="$(echo "${pr_json}" | jq -r '.head.ref // empty' 2>/dev/null || true)"
            pr_labels_json="$(echo "${pr_json}" | jq -c '[.labels[]?.name]' 2>/dev/null || echo '[]')"
            if [ -z "${pr_title}" ]; then
              pr_title="PR #${pr_number}"
            fi
            initiative_id="$(bash scripts/ci/insights_resolve_initiative.sh "${pr_number}" "${pr_title}" "${pr_head_ref}" "${pr_labels_json}")"
            title="${pr_title}"
          else
            short_sha="$(echo "${HEAD_SHA:-unknown}" | cut -c1-12)"
            initiative_id="release-failed-${short_sha}"
            title="${HEAD_COMMIT_MESSAGE:-Production release failed}"
          fi
          started_at="${HEAD_COMMIT_TIMESTAMP:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}"
          bash scripts/ci/insights_ingest.sh start \
            "${initiative_id}" \
            "${title}" \
            "${started_at}" \
            "source=production-release" \
            "sha=${HEAD_SHA}" \
            "run_id=${RUN_ID}"
          bash scripts/ci/insights_ingest.sh event \
            "${initiative_id}" \
            "PRODUCTION_RELEASE_FAILED" \
            "source=production-release" \
            "sha=${HEAD_SHA}" \
            "run_id=${RUN_ID}"

      - name: Deploy fallback notice (SSH unavailable)
        if: ${{ steps.deploy_config.outputs.enabled == 'true' && steps.deploy_ssh.outcome != 'success' }}
        run: |
          echo "::warning::SSH deploy failed from GitHub Actions. VPS fallback timer should reconcile deployment."

      - name: Deploy skip notice (QA verification mode)
        if: ${{ steps.deploy_config.outputs.enabled != 'true' && github.event.inputs.skip_deploy == 'true' }}
        run: |
          echo "::notice::Deployment skipped intentionally (QA verification mode via skip_deploy)."

      - name: Deploy fallback notice (SSH not configured)
        if: ${{ steps.deploy_config.outputs.enabled != 'true' && github.event.inputs.skip_deploy != 'true' }}
        run: |
          echo "SSH deploy is not configured. Deployment will rely on homedir-auto-deploy.timer fallback on the VPS."
