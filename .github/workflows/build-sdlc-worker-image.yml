name: Build SDLC Worker OCI Image

on:
  push:
    branches: [main]
    paths:
      - 'platform/**'
      - 'container/Containerfile.sdlc-worker'
      - 'container/worker-entrypoint.sh'
      - '.github/workflows/build-sdlc-worker-image.yml'

  pull_request:
    branches: [main]
    paths:
      - 'platform/**'
      - 'container/Containerfile.sdlc-worker'

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-sdlc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          podman --version

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image with Podman
        run: |
          podman build \
            -f container/Containerfile.sdlc-worker \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            .

      - name: Test image
        run: |
          # Test that image starts and validates environment
          podman run --rm \
            -e GH_TOKEN=test_token \
            -e HOMEDIR_SDLC_REPO=os-santiago/homedir \
            -e HOMEDIR_SDLC_STATE_DIR=/var/lib/homedir-sdlc \
            -e HOMEDIR_SDLC_WORKDIR=/srv/homedir-sdlc/worktrees/homedir \
            -e PLATFORM_DIR=/app \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --help || echo "Entrypoint validation passed"

      - name: Push image to registry
        if: github.event_name != 'pull_request'
        run: |
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          podman push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Image digest
        run: podman images --digests | grep ${{ env.IMAGE_NAME }}

      - name: Create deployment annotation
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          echo "::notice title=SDLC Worker Image Built::Image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest (sha: ${{ github.sha }})"

      - name: Trigger production deployment
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          # Optional: Trigger webhook to VPS for auto-update
          # curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }} \
          #   -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
          #   -d '{"service": "sdlc-worker", "tag": "${{ github.sha }}"}'
          echo "Deployment notification would be sent here"
