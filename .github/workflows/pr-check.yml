name: PR Validation

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify Build, Tests and Coverage Gate
        working-directory: quarkus-app
        run: ./mvnw clean verify -B -Pcoverage -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Public Experience Smoke Test
        working-directory: quarkus-app
        run: ./mvnw -B -Dtest=PublicExperienceSmokeTest test
        
      # Optional: Add checkstyle or other linting here if configured
      # - name: Checkstyle
      #   working-directory: quarkus-app
      #   run: ./mvnw checkstyle:check
