name: PR Validation

on:
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Verify
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: PR preflight (build, tests, smoke) with retry
        run: ./scripts/ci/pr_preflight.sh
        
      # Optional: Add checkstyle or other linting here if configured
      # - name: Checkstyle
      #   working-directory: quarkus-app
      #   run: ./mvnw checkstyle:check
