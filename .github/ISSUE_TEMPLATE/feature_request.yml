name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature] "
labels: ["type:feature", "priority:P2"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve.

        This template will automatically apply `type:feature` and `priority:P2` labels. Maintainers will adjust priority during triage.

        📚 See [Label Taxonomy](../../config/docs/governance/LABEL_TAXONOMY.md) for label definitions.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical (blocking release)
        - High (important gap)
        - Medium (nice to have)
        - Low (future consideration)
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API / Backend
        - Frontend / UI
        - CI / DevOps
        - Documentation
        - Security
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: Users currently cannot...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this to be considered complete?
      placeholder: |
        - [ ] Feature works in X scenario
        - [ ] Documentation updated
        - [ ] Tests pass
    validations:
      required: true

  - type: checkboxes
    id: definition
    attributes:
      label: Definition of Ready
      options:
        - label: Problem clearly defined
        - label: Acceptance criteria defined
        - label: No duplicate issue exists
        - label: Area identified
    validations:
      required: true
